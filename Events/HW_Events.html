<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Events Demo</title>

    <style>
        body {
            background-color: #414141;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 15px;
        }

        img {
            width: 200px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        a {
            color: lightblue;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h2>Amazing Images (Click to Remove)</h2>

    <ul id="images">
        <li>
            <img id="photoshop"
                src="https://upload.wikimedia.org/wikipedia/commons/a/af/Adobe_Photoshop_CC_icon.svg"
                 alt="Photoshop Logo">  
                 <button id="PhotoButton">Remove Image</button>     
        </li>

        <li>
            <img id="japan"
                src="https://images.unsplash.com/photo-1501785888041-af3ef285b470"
                alt="Mount Fuji">
                <button id="JapanButton">Remove Image</button>
        </li>

        <li>
            <img id="Nature"
                src="https://images.unsplash.com/photo-1549880338-65ddcdfd017b"
                alt="Nature Image">
                <button id="NatureButton">Remove Image</button>
        </li>

        <li>
            <img id="photoman"
                src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"
                alt="Photographer">
                <button id="PhotoManButton">Remove Image</button>
        </li>

        <li>
            <img id="tiger"
                src="https://images.unsplash.com/photo-1546182990-dffeafbe841d"
                alt="Tiger">
                <button id="TigerButton">Remove Image</button>
        </li>

        <li>
            <a href="https://google.com" id="google">Visit Google</a>
            <button id="googleButton">Remove Link</button>

        </li>
    </ul>
  </body>
  <script>
    
    const photoshop = document.getElementById("PhotoButton")
    const japan = document.getElementById("JapanButton")
    const nature = document.getElementById("NatureButton")
    const photoman = document.getElementById("PhotoManButton")
    const tiger = document.getElementById("TigerButton")
    const google = document.getElementById("googleButton")

    photoshop.addEventListener("click",function(){

        document.getElementById("photoshop").style.display="none";
    })
   
    japan.addEventListener("click",function(){
        document.getElementById("japan").style.display="none";
    })

    nature.addEventListener("click",function(){
        document.getElementById("Nature").style.display="none";
    })

    photoman.addEventListener("click",function(){
        document.getElementById("photoman").style.display="none";
    })

    tiger.addEventListener("click",function(){
        document.getElementById("tiger").style.display="none";
    })

    google.addEventListener("click",function(){
        document.getElementById("google").style.display="none";
    })
  </script>
  </html>
